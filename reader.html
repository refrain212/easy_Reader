<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单阅读器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Right-side floating buttons (reader mode only) -->
<div id="side-btns">
    <button class="sb-btn" id="sb-toc" title="目录">☰</button>
    <button class="sb-btn" id="sb-notes" title="笔记">✏</button>
    <button class="sb-btn" id="sb-layout" title="双栏阅读">⊞</button>
    <button class="sb-btn" id="sb-font" title="字体设置">A</button>
    <button class="sb-btn" id="sb-theme" title="深色模式">🌙</button>
</div>

<!-- Help button -->
<button id="btn-help" title="使用说明">？</button>
<div id="help-backdrop"></div>
<div id="help-modal">
    <div id="help-modal-hd"><span>使用说明</span><button id="help-close">✕</button></div>
    <div id="help-body"></div>
</div>

<!-- Annotation popup menu -->
<div id="annot-menu">
    <button class="am-btn" id="am-copy"><span class="am-icon">⎘</span><span class="am-lbl">复制</span></button>
    <button class="am-btn" id="am-hl"><span class="am-icon am-icon-hl">A</span><span class="am-lbl">马克笔</span></button>
    <button class="am-btn" id="am-wave"><span class="am-icon am-icon-wave">A</span><span class="am-lbl">波浪线</span></button>
    <button class="am-btn" id="am-line"><span class="am-icon am-icon-line">A</span><span class="am-lbl">直线</span></button>
    <button class="am-btn" id="am-note"><span class="am-icon">✏</span><span class="am-lbl">写想法</span></button>
</div>
<!-- Annotation right-click context menu -->
<div id="annot-ctx">
    <button id="annot-ctx-del">删除标注</button>
</div>

<!-- Page navigation (columns mode) -->
<div id="pg-nav">
    <button class="pg-btn" id="pg-prev" title="上一页 ←">◀</button>
    <span id="pg-info"></span>
    <button class="pg-btn" id="pg-next" title="下一页 →">▶</button>
</div>

<!-- TOC Drawer -->
<div id="toc-backdrop"></div>
<div id="toc-panel">
    <div id="toc-head">
        <span>目 录</span>
        <button id="toc-close" title="关闭">✕</button>
    </div>
    <div id="toc-list"></div>
</div>

<!-- Notes Panel -->
<div id="notes-backdrop"></div>
<div id="notes-panel">
    <div id="notes-head">
        <span>笔 记</span>
        <button id="notes-close" title="关闭">✕</button>
    </div>
    <div id="notes-list"></div>
    <div id="notes-add">
        <textarea id="notes-input" placeholder="在此记录笔记（自动关联当前章节）"></textarea>
        <button id="notes-save">保存</button>
    </div>
</div>

<!-- Font Panel -->
<div id="font-backdrop"></div>
<div id="font-panel">
    <div id="font-head">
        <span>字体设置</span>
        <button id="font-close" title="关闭">✕</button>
    </div>
    <div id="font-body">
        <div>
            <div class="fp-label">字号：<strong id="fp-size-val">18</strong> px</div>
            <div class="fp-slider-row">
                <span>小</span>
                <input type="range" id="fp-slider" min="12" max="34" step="2" value="18">
                <span>大</span>
            </div>
        </div>
        <div>
            <div class="fp-label">字体</div>
            <div id="fp-family-grid"></div>
            <button id="fp-import-btn">＋ 导入字体文件</button>
        </div>
    </div>
</div>

<div id="app-wrap">
<header id="tb">
    <div class="tl">
        <span id="app-title">📖 简单阅读器</span>
        <button id="btn-open">导入文件</button>
        <button id="btn-shelf">书架</button>
        <input type="file" id="fi" accept=".txt,.pdf,.epub" style="display:none">
    </div>
    <div class="tc">
        <input id="si" type="text" placeholder="全文检索（Ctrl+F）" autocomplete="off">
        <button id="btn-prev" title="上一处 Shift+Enter">◀</button>
        <span id="sc">—</span>
        <button id="btn-next" title="下一处 Enter">▶</button>
        <button id="btn-clr" title="清除">✕</button>
    </div>
</header>

<main id="ct">
        <div id="shelf" style="display:none">
            <div id="shelf-hd">
                <h2>书架</h2>
            </div>
            <div id="shelf-grid"></div>
        </div>
        <div id="rp" style="display:none">
            <div id="rp-hd">
                <span id="rp-cnt"></span>
                <button id="rp-back">返回阅读 ✕</button>
            </div>
            <div id="rp-bd"></div>
        </div>
        <div id="welcome">
            <div class="ic">📜</div>
            <h2>简单阅读器</h2>
            <p>支持 TXT · PDF · EPUB 格式</p>
            <p style="margin-top:4px">点击「导入文件」或将文件拖放至此处</p>
        </div>
        <div id="loading" style="display:none">加载中 <div class="spinner"></div></div>
        <div id="col-vp"><div id="reader" style="display:none"></div></div>
    </main>
</div><!-- /#app-wrap -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
